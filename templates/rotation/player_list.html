{% extends 'rotation/base.html' %}
{% block title %}球员列表{% endblock %}
{% block content %}
<h2 class="mb-4">球员列表</h2>
<div class="card">
  <div class="table-responsive">
    <table class="table table-hover mb-0">
      <thead class="table-light">
        <tr>
          <th>姓名</th>
          <th>昵称</th>
          <th>参与活动</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        {% for p in players %}
        <tr>
          <td>{{ p.name }}</td>
          <td>{{ p.nickname|default:"-" }}</td>
          <td>{{ p.session_count }} 次</td>
          <td><a href="{% url 'player_detail' p.pk %}" class="btn btn-sm btn-outline-primary">统计</a></td>
        </tr>
        {% empty %}
        <tr><td colspan="4" class="text-center text-muted py-4">暂无球员</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
