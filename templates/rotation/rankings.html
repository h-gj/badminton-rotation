{% extends 'rotation/base.html' %}
{% block title %}排行榜{% endblock %}
{% block content %}
<div class="session-page club-home-page">
  {% include 'rotation/includes/club_header.html' %}
  {% include 'rotation/includes/club_tabs.html' %}

  <div class="rankings-page player-page" id="rankingsPage"
       data-api-url="{% url 'rankings' %}">
    <p class="player-page-subtitle club-section-subtitle" id="rankingsSubtitle">加载中…</p>

    <div class="player-list-search-wrap" id="rankingsSearchWrap" hidden>
      <input type="search" id="rankingsSearch" class="form-control player-list-search"
             placeholder="搜索姓名或昵称…" autocomplete="off">
    </div>

    <section class="rankings-section">
      <div class="rankings-section-head">
        <h2 class="rankings-section-title">胜率</h2>
        <p class="rankings-section-meta" id="rankingsWinRateMeta"></p>
      </div>
      <div class="player-list-card" id="rankingsWinRate">
        <div class="player-list-placeholder">加载中…</div>
      </div>
    </section>

    <section class="rankings-section">
      <div class="rankings-section-head">
        <h2 class="rankings-section-title">出勤率</h2>
        <p class="rankings-section-meta" id="rankingsAttendanceMeta"></p>
      </div>
      <div class="player-list-card" id="rankingsAttendance">
        <div class="player-list-placeholder">加载中…</div>
      </div>
    </section>

    <section class="rankings-section">
      <div class="rankings-section-head">
        <h2 class="rankings-section-title">搭档胜率</h2>
        <p class="rankings-section-meta" id="rankingsPartnerMeta">搭过 4 场以上才统计</p>
      </div>
      <div class="player-list-card" id="rankingsPartner">
        <div class="player-list-placeholder">加载中…</div>
      </div>
    </section>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function () {
  var pageEl = document.getElementById('rankingsPage');
  if (!pageEl) return;

  var apiUrl = pageEl.dataset.apiUrl;
  var subtitleEl = document.getElementById('rankingsSubtitle');
  var searchWrap = document.getElementById('rankingsSearchWrap');
  var searchInput = document.getElementById('rankingsSearch');
  var winRateMeta = document.getElementById('rankingsWinRateMeta');
  var attendanceMeta = document.getElementById('rankingsAttendanceMeta');
  var partnerMeta = document.getElementById('rankingsPartnerMeta');
  var winRateCard = document.getElementById('rankingsWinRate');
  var attendanceCard = document.getElementById('rankingsAttendance');
  var partnerCard = document.getElementById('rankingsPartner');

  var state = {
    q: '',
    loading: false,
    totalSessions: null,
  };
  var searchTimer = null;

  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function avatarHtml(player, sizeClass) {
    sizeClass = sizeClass || 'player-avatar-md';
    if (player.avatar_url) {
      return '<img src="' + escapeHtml(player.avatar_url) + '" alt="" class="player-avatar ' + sizeClass + ' player-avatar-img">';
    }
    var initial = player.display_name ? player.display_name.slice(0, 1) : '?';
    return '<span class="player-avatar ' + sizeClass + '">' + escapeHtml(initial) + '</span>';
  }

  function rankHtml(rank) {
    if (rank === 1) {
      return '<span class="rankings-rank"><span class="rank-medal" title="冠军">🥇</span></span>';
    }
    if (rank === 2) {
      return '<span class="rankings-rank"><span class="rank-medal" title="亚军">🥈</span></span>';
    }
    if (rank === 3) {
      return '<span class="rankings-rank"><span class="rank-medal" title="季军">🥉</span></span>';
    }
    return '<span class="rankings-rank rankings-rank-n">' + rank + '</span>';
  }

  function renderWinRateItem(item) {
    return (
      '<a href="' + escapeHtml(item.detail_url) + '" class="rankings-item">' +
        rankHtml(item.rank) +
        avatarHtml(item) +
        '<div class="rankings-info">' +
          '<div class="rankings-name">' + escapeHtml(item.display_name) + '</div>' +
          '<div class="rankings-meta">' + item.wins + ' 胜 ' + item.losses + ' 负 · ' + item.matches + ' 场</div>' +
        '</div>' +
        '<div class="rankings-stat">' +
          '<div class="rankings-stat-value">' + item.win_rate + '%</div>' +
          '<div class="rankings-stat-label">胜率</div>' +
        '</div>' +
      '</a>'
    );
  }

  function renderAttendanceItem(item) {
    return (
      '<a href="' + escapeHtml(item.detail_url) + '" class="rankings-item">' +
        rankHtml(item.rank) +
        avatarHtml(item) +
        '<div class="rankings-info">' +
          '<div class="rankings-name">' + escapeHtml(item.display_name) + '</div>' +
          '<div class="rankings-meta">参与 ' + item.sessions_attended + ' / ' + item.total_sessions + ' 场活动</div>' +
        '</div>' +
        '<div class="rankings-stat">' +
          '<div class="rankings-stat-value">' + item.attendance_rate + '%</div>' +
          '<div class="rankings-stat-label">出勤率</div>' +
        '</div>' +
      '</a>'
    );
  }

  function renderPartnerItem(item) {
    return (
      '<div class="rankings-item-static">' +
        rankHtml(item.rank) +
        '<div class="rankings-partner-avatars">' +
          avatarHtml(item.player1, 'player-avatar-sm') +
          avatarHtml(item.player2, 'player-avatar-sm') +
        '</div>' +
        '<div class="rankings-info">' +
          '<div class="rankings-partner-names">' +
            '<a href="' + escapeHtml(item.player1.detail_url) + '">' + escapeHtml(item.player1.display_name) + '</a>' +
            '<span class="rankings-partner-sep">&</span>' +
            '<a href="' + escapeHtml(item.player2.detail_url) + '">' + escapeHtml(item.player2.display_name) + '</a>' +
          '</div>' +
          '<div class="rankings-meta">' + item.wins + ' 胜 ' + item.losses + ' 负 · ' + item.matches + ' 场</div>' +
        '</div>' +
        '<div class="rankings-stat">' +
          '<div class="rankings-stat-value">' + item.win_rate + '%</div>' +
          '<div class="rankings-stat-label">胜率</div>' +
        '</div>' +
      '</div>'
    );
  }

  var EMPTY_MESSAGES = {
    win_rate: '暂无比赛数据，完成计分后会出现在这里',
    attendance: '暂无出勤数据，球员报名活动后会出现在这里',
    partner: '暂无搭档数据，搭档完成 4 场以上后会出现在这里',
  };

  function renderSection(cardEl, items, renderFn, emptyMsg) {
    if (!items.length) {
      cardEl.innerHTML = '<div class="player-list-placeholder">' + emptyMsg + '</div>';
      return;
    }
    cardEl.innerHTML = items.map(renderFn).join('');
  }

  function sectionMeta(total, suffix) {
    if (!total) return '';
    return '共 ' + total + suffix;
  }

  function renderRankings(data) {
    var sections = data.sections || {};
    var winRate = sections.win_rate || { total: 0, items: [] };
    var attendance = sections.attendance || { total: 0, items: [] };
    var partner = sections.partner || { total: 0, items: [] };
    state.totalSessions = data.total_sessions;

    var hasAny = winRate.total || attendance.total || partner.total;
    searchWrap.hidden = !hasAny && !state.q;

    if (!hasAny && !state.q) {
      subtitleEl.textContent = '完成计分与报名后，排行榜会自动更新';
    } else if (state.q) {
      subtitleEl.textContent = '搜索「' + state.q + '」的结果';
    } else if (state.totalSessions) {
      subtitleEl.textContent = '已有 ' + state.totalSessions + ' 场活动 · 各榜展示前 10 名';
    } else {
      subtitleEl.textContent = '各榜展示前 10 名';
    }

    winRateMeta.textContent = sectionMeta(winRate.total, ' 人');
    if (state.totalSessions) {
      attendanceMeta.textContent = '已有 ' + state.totalSessions + ' 场活动 · ' + sectionMeta(attendance.total, ' 人');
    } else {
      attendanceMeta.textContent = sectionMeta(attendance.total, ' 人');
    }
    partnerMeta.textContent = '搭过 4 场以上才统计 · ' + sectionMeta(partner.total, ' 对');

    var emptySuffix = state.q ? '没有匹配的排行数据' : '';
    renderSection(
      winRateCard,
      winRate.items,
      renderWinRateItem,
      state.q ? emptySuffix : EMPTY_MESSAGES.win_rate
    );
    renderSection(
      attendanceCard,
      attendance.items,
      renderAttendanceItem,
      state.q ? emptySuffix : EMPTY_MESSAGES.attendance
    );
    renderSection(
      partnerCard,
      partner.items,
      renderPartnerItem,
      state.q ? emptySuffix : EMPTY_MESSAGES.partner
    );
  }

  function syncUrl() {
    var params = new URLSearchParams();
    if (state.q) params.set('q', state.q);
    var qs = params.toString();
    history.replaceState(null, '', qs ? ('?' + qs) : window.location.pathname);
  }

  function setLoading() {
    var loadingHtml = '<div class="player-list-placeholder">加载中…</div>';
    winRateCard.innerHTML = loadingHtml;
    attendanceCard.innerHTML = loadingHtml;
    partnerCard.innerHTML = loadingHtml;
  }

  function loadRankings() {
    if (state.loading) return;
    state.loading = true;
    setLoading();

    var params = new URLSearchParams();
    if (state.q) params.set('q', state.q);
    var qs = params.toString();

    fetch(apiUrl + (qs ? ('?' + qs) : ''), {
      headers: { 'X-Requested-With': 'XMLHttpRequest' },
      credentials: 'same-origin',
    }).then(function (resp) {
      return resp.json();
    }).then(function (data) {
      state.loading = false;
      renderRankings(data);
      syncUrl();
    }).catch(function () {
      state.loading = false;
      subtitleEl.textContent = '加载失败';
      var failHtml = '<div class="player-list-placeholder">加载失败，请刷新重试</div>';
      winRateCard.innerHTML = failHtml;
      attendanceCard.innerHTML = failHtml;
      partnerCard.innerHTML = failHtml;
    });
  }

  searchInput.addEventListener('input', function () {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function () {
      state.q = searchInput.value.trim();
      loadRankings();
    }, 400);
  });

  searchInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      clearTimeout(searchTimer);
      state.q = searchInput.value.trim();
      loadRankings();
    }
  });

  var initial = new URLSearchParams(window.location.search);
  state.q = initial.get('q') || '';
  if (state.q) searchInput.value = state.q;

  loadRankings();
})();
</script>
{% endblock %}
