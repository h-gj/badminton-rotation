{% extends 'rotation/base.html' %}
{% block title %}报名 - {{ session.title }}{% endblock %}
{% block content %}
<h2 class="mb-4">报名：{{ session.title }}</h2>
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
          </div>
          {% endfor %}
          <button type="submit" class="btn btn-success w-100">确认报名</button>
        </form>
      </div>
    </div>
    <div class="text-center mt-3">
      <a href="{% url 'session_detail' session.pk %}">返回活动</a>
    </div>
  </div>
</div>
{% endblock %}
