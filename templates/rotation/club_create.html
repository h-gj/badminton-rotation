{% extends 'rotation/base.html' %}
{% block title %}创建俱乐部 - 羽转{% endblock %}
{% block content %}
<div class="session-page auth-page">
  <div class="auth-card">
    <h2 class="auth-title">创建俱乐部</h2>
    <p class="auth-subtitle">作为组织者创建俱乐部，供队友选择加入</p>
    <form method="post" class="auth-form">
      {% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
        <div class="text-danger small">{{ field.errors.0 }}</div>
        {% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary btn-lg w-100 auth-submit">创建俱乐部</button>
    </form>
    <p class="auth-switch">已有邀请码？<a href="{% url 'club_join' %}">加入俱乐部</a> · <a href="{% url 'club_setup' %}">返回</a></p>
  </div>
</div>
{% endblock %}
